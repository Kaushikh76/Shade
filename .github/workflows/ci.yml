name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── TypeScript: typecheck + offline unit tests ─────────────────────────────
  typecheck-and-test:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Note vault unit tests
        run: npm run vault:test

      - name: SDK smoke tests
        run: npm run sdk:test

      - name: Security gates
        run: npm run security:gates

  # ── Rust: Soroban contract build ───────────────────────────────────────────
  contracts-build:
    name: Stellar contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + wasm32v1-none
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts/stellar

      - name: Build Soroban contracts
        run: cargo build --manifest-path contracts/stellar/Cargo.toml --target wasm32v1-none --release
